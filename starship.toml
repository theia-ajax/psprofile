"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# default format includes some stuff I don't want but keeping this around 
# as an easy way to reenable everything if I find something important is missing
# format = "$all"
 
format = """
$username\
$hostname\
$localip\
$shlvl\
$directory\
$vcsh\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$hg_state\
$pijul_channel\
$package\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$nats\
$direnv\
$env_var\
$mise\
$crystal\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$netns\
$shell\
$character"""
 
[character]
success_symbol = "[➜](bold green)"

[directory]
truncation_length = 0
truncate_to_repo = true
 
[line_break]
disabled = true
 
[git_status]
use_git_executable = false
ignore_submodules = true